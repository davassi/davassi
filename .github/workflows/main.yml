name: Update profile SVGs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "assets/dark_mode.svg"
      - "assets/light_mode.svg"
      - "assets/loc_cache.txt"

permissions:
  contents: write

concurrency:
  group: update-svgs
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Restore/save LOC cache
        uses: actions/cache@v4
        with:
          path: assets/loc_cache.txt
          key: loc-cache-${{ github.run_id }}
          restore-keys: |
            loc-cache-
      - name: Generate SVGs
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python today.py
      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/dark_mode.svg assets/light_mode.svg
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh profile stats [skip ci]"
            git push
          fi
